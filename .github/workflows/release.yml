name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  ci:
    name: Test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run typecheck
      - run: bun test
      - run: bun run build

  release:
    name: Publish to npm
    needs: ci
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write # Required for npm trusted publishing + provenance
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v5
        with:
          # npm trusted publishing needs npm 11.5.1+; node 24 ships a
          # recent enough version.
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: bun install

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # `npm version <bump>` invokes our `version` script (which runs
      # scripts/sync-version.ts to keep the README in lockstep), then
      # creates a commit + tag.
      - name: Bump version
        run: 'npm version ${{ inputs.version }} -m "chore: release v%s"'

      - name: Push changes
        run: git push --follow-tags

      # Trusted publishing: no NODE_AUTH_TOKEN. npm exchanges the GitHub
      # OIDC token (granted via id-token: write above) for a scoped
      # publish credential. Requires the package to already exist on
      # npm and the trusted publisher to be configured for this repo +
      # workflow file + environment name.
      #
      # `--provenance` attaches a signed attestation linking the tarball
      # to this exact workflow run; appears as a badge on the npm page.
      #
      # `prepublishOnly` (in package.json) runs `bun run build` so the
      # dist/ directory is freshly built from the bumped version.
      - name: Publish to npm
        run: npm publish --access public --provenance
